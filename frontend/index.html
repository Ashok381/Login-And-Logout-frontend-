<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Auth Flow Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-view" class="view hidden">
        <div class="card">
            <h2>Login</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username(ashok7061)">
                <h3>or</h3>
                <input type="text" id="email" placeholder="Email(abc@gmail.com)" >
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" style="background-color: blue; color: rgb(246, 229, 0); font-weight: bold;">Sign In </button>
                <p>New user? Sign up first</p>
                <input type="button" name="signup" id="signup" value="sign Up" onclick="showSignupform()" style="cursor: pointer;">
            </form>
        </div>
    </div>
       <div id="signup-view" class="view hidden">
        <div class="card">
            <h2>Sign UP</h2>
<form id="signup-form">

    <input
        type="text"
        id="Username"
        name="username"
        placeholder="Username"
        required
    >

    <input
        type="email"
        id="Email"
        name="email"
        placeholder="Email"
        required
    >

    <input
        type="text"
        id="fullName"
        name="fullName"
        placeholder="Full Name"
        required
    >

    <label > profile Image</label>
    <input 
        type="file"
        id="avatar"
        name="avatar"
        accept="image/*"
        required
    >
<label> coverImage</label>
    <input
        type="file"
        id="coverImage"
        name="coverImage"
        accept="image/*"
    >

    <input
        type="Password"
        id="Password"
        name="password"
        placeholder="Password"
        required
    >

   <button type="button" onclick="signupform()" >sign up</button>
   <input type="button" value="Login" onclick="showLoginform()">
</form>
        </div>
    </div>

    <div id="dashboard-view" class="view hidden">
        <div class="card">
            <h2>Welcome to your Dashboard! 🎉</h2>
            <p style="color: blanchedalmond;">Account Information </p>
            <div id="details"></div>
            <button id="logout-btn">Log Out</button>
        </div>
    </div>

<div id="info"></div>
    <script src="script.js"></script>
</body>
</html>
